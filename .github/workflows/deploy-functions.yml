name: Deploy Cloud Functions

# functions 配下が変わって push されたら自動デプロイ。
# 手動実行 (workflow_dispatch) も可能。
on:
  push:
    branches:
      - claude/mlm-org-chart-setup-imou7e
      - main
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Workload Identity Federation に必要
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Workload Identity Federation で Google 認証（鍵ファイル不要）
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 実行時サービスアカウント（デフォルトの compute SA）に
      # Secret 読み取りと Firestore 書き込みの権限を付与（冪等）
      - name: Grant runtime permissions
        run: |
          PROJECT="${{ secrets.FIREBASE_PROJECT_ID }}"
          PNUM="$(gcloud projects describe "$PROJECT" --format='value(projectNumber)')"
          COMPUTE_SA="${PNUM}-compute@developer.gserviceaccount.com"
          for SECRET in STRIPE_SECRET_KEY STRIPE_WEBHOOK_SECRET; do
            gcloud secrets add-iam-policy-binding "$SECRET" \
              --member="serviceAccount:${COMPUTE_SA}" \
              --role="roles/secretmanager.secretAccessor" \
              --project="$PROJECT" || true
          done
          gcloud projects add-iam-policy-binding "$PROJECT" \
            --member="serviceAccount:${COMPUTE_SA}" \
            --role="roles/datastore.user" --condition=None || true

      # gcloud で gen2 関数を直接デプロイ（WIF と相性が良い）
      - name: Deploy function
        run: |
          gcloud functions deploy stripeWebhook \
            --gen2 \
            --region=asia-northeast1 \
            --runtime=nodejs20 \
            --source=functions \
            --entry-point=stripeWebhook \
            --trigger-http \
            --allow-unauthenticated \
            --max-instances=3 \
            --set-secrets="STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest" \
            --set-env-vars="STRIPE_PRICE_LIGHT=price_1TlLpN3PcHAXuuwfmxX3hsWD,STRIPE_PRICE_PRO=price_1TlLq33PcHAXuuwfa52GYCKj" \
            --project="${{ secrets.FIREBASE_PROJECT_ID }}"

      - name: Show function URL
        run: |
          echo "===== Webhook URL ====="
          gcloud functions describe stripeWebhook --gen2 \
            --region=asia-northeast1 \
            --project="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --format='value(serviceConfig.uri)'
          echo "======================="
